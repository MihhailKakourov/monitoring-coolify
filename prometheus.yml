global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 1. Frontend
  - job_name: 'feedback-frontend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['feedback-board:3000']

  # 2. Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:9109']

  # 3. Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
